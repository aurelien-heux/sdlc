# Any OpenAI-compatible endpoint (OpenAI, Ollama, vLLM, LM Studio, LiteLLM):
# point OPENAI_BASE_URL at it, /v1 included; the client appends
# OPENAI_COMPLETIONS_PATH (default /chat/completions).
spring:
  ai:
    model:
      chat: openai
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY}
      chat:
        completions-path: ${OPENAI_COMPLETIONS_PATH:/chat/completions}
        options:
          model: ${OPENAI_MODEL:gpt-5.2}
          max-tokens: 4096
